name: Karachi Car Scalper Engine

on:
  schedule:
    # 🕒 Cron schedule: Runs every 15 minutes (GitHub free tier limit)
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI anytime

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18
        cache: 'npm'

    - name: Install Dependencies
      run: npm install

    - name: Run Scalper Engine
      run: node scraper.js

    - name: Commit & Push Seen Ads DB
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add seen_ads.json || true
        git commit -m "Auto-update seen_ads database [skip ci]" -a || true
        git push || true