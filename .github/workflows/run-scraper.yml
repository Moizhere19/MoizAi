name: Karachi Car Scalper Engine

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: 

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    # 1. Upgraded to v4 for Node.js 24 compatibility
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Upgraded to v4 with Node.js 24
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: 'npm'

    # 3. 🔥 CRITICAL: Install Linux Dependencies for Chrome/Puppeteer
    - name: Install Google Chrome & Missing Linux Libraries
      run: |
        sudo apt-get update
        sudo apt-get install -y wget gnupg
        wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google.list'
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable --no-install-recommends
        sudo apt-get install -y libgconf-2-4 libatk1.0-0 libatk-bridge2.0-0 libgdk-pixbuf2.0-0 libgtk-3-0 libgbm-dev libnss3 libxss1 libasound2

    - name: Install Dependencies
      run: npm install

    - name: Run Scalper Engine
      run: node scraper.js
      env:
        # Prevents Puppeteer from downloading its own heavy chrome binary
        PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
        # Force GitHub Actions backend to accept modern node environments
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    - name: Commit & Push Seen Ads DB
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add seen_ads.json || true
        git commit -m "Auto-update seen_ads database [skip ci]" -a || true
        git push || true
