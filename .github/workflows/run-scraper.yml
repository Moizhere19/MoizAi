name: Karachi Car Scalper Engine

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: 

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # Force integration of Node 24 directly onto the runner environment
    - name: Setup Node.js v24
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: 'npm'

    - name: Install Google Chrome & Linux Libraries
      run: |
        sudo apt-get update
        sudo apt-get install -y wget gnupg
        wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google.list'
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable --no-install-recommends
        sudo apt-get install -y libgconf-2-4 libatk1.0-0 libatk-bridge2.0-0 libgdk-pixbuf2.0-0 libgtk-3-0 libgbm-dev libnss3 libxss1 libasound2

    # Clear old locks and force correct installations
    - name: Install Hardened Dependencies
      run: |
        rm -rf node_modules package-lock.json
        npm install puppeteer-core@21.5.0 puppeteer-extra puppeteer-extra-plugin-stealth axios express

    - name: Run Scalper Engine
      run: node scraper.js
      env:
        PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'

    - name: Commit & Push Seen Ads DB
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add seen_ads.json || true
        git commit -m "Auto-update seen_ads database [skip ci]" -a || true
        git push || true
